<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect x="2" y="2" width="28" height="28" rx="7" fill="#3b82f6"/>
  <!-- Stepped peaks: small → medium → large, ascending right.
       Reads as a mountain range AND as a 3-tier hierarchy
       (Group → Column → Task). -->
  <path d="M5 23 L9 17 L13 23 Z" fill="white" fill-opacity="0.55"/>
  <path d="M11 23 L16 13 L21 23 Z" fill="white" fill-opacity="0.78"/>
  <path d="M19 23 L24 9 L29 23 Z" fill="white"/>
  <!-- Ground line, subtle horizon -->
  <line x1="4" y1="23.5" x2="28" y2="23.5" stroke="white" stroke-opacity="0.6" stroke-width="0.75" stroke-linecap="round"/>
</svg>
