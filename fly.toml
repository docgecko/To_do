# Fly.io configuration for the Orelle Phoenix release.
#
# Run migrations on every deploy (release_command), bind to an HTTP service
# on Fly's internal port 4000, and let Fly's edge proxy terminate TLS for
# us. The libsql replica file lives at /tmp/to_do.db (ephemeral; resyncs
# from Turso on boot), so no volumes are mounted.

app = "orelle"
primary_region = "lhr"

[build]

[deploy]
  release_command = "/app/bin/migrate"

[env]
  PHX_HOST = "orelle.app"
  PORT = "4000"
  REPLICA_PATH = "/tmp/to_do.db"

[http_service]
  internal_port = 4000
  force_https = true
  # Always-on. Auto-stop kept the cold-start UX poor AND multiplied Turso
  # sync bandwidth because every wake from idle re-syncs the local libsql
  # replica from scratch — for a private beta with sporadic traffic this
  # blew through Turso's free-tier sync allowance. Cheaper to leave one
  # shared-cpu-1x machine running 24/7 (~$2-3/mo) than to pay for the
  # bandwidth on Turso's paid tier.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/"
    protocol = "http"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
